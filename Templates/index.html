<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediksi Biaya Rumah Sakit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-predict { background-color: #007bff; color: white; width: 100%; }
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4">
                <h3 class="text-center mb-4">Estimasi Billing Amount</h3>
                <form id="predictForm">
                    <div class="mb-3">
                        <label for="age" class="form-label">Usia (Age)</label>
                        <input type="number" class="form-control" id="age" name="Age" placeholder="Contoh: 25" required>
                    </div>

                    <div class="mb-3">
                        <label for="gender" class="form-label">Jenis Kelamin (Gender)</label>
                        <select class="form-select" id="gender" name="Gender" required>
                            <option value="" selected disabled>Pilih Gender</option>
                            <option value="Male">Laki-laki</option>
                            <option value="Female">Perempuan</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="blood_type" class="form-label">Golongan Darah (Blood Type)</label>
                        <select class="form-select" id="blood_type" name="Blood Type" required>
                            <option value="" selected disabled>Pilih Golongan Darah</option>
                            <option value="A+">A+</option>
                            <option value="A-">A-</option>
                            <option value="B+">B+</option>
                            <option value="B-">B-</option>
                            <option value="AB+">AB+</option>
                            <option value="AB-">AB-</option>
                            <option value="O+">O+</option>
                            <option value="O-">O-</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="medical_condition" class="form-label">Kondisi Medis (Medical Condition)</label>
                        <select class="form-select" id="medical_condition" name="Medical Condition" required>
                            <option value="" selected disabled>Pilih Kondisi</option>
                            <option value="Cancer">Kanker</option>
                            <option value="Diabetes">Diabetes</option>
                            <option value="Asthma">Asma</option>
                            <option value="Obesity">Obesitas</option>
                            <option value="Hypertension">Hipertensi</option>
                            <option value="Arthritis">Arthritis</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-predict btn-lg">Prediksi Sekarang</button>
                </form>

                <hr>
                <div id="result" class="text-center mt-3 d-none">
                    <h5>Estimasi Tagihan:</h5>
                    <h2 class="text-success" id="billingAmount">$0.00</h2>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const form = document.getElementById('predictForm');
    const resultDiv = document.getElementById('result');
    const amountText = document.getElementById('billingAmount');

    form.onsubmit = async (e) => {
        e.preventDefault();
        
        // Ambil data dari form
        const formData = new FormData(form);
        const data = Object.fromEntries(formData.entries());

        // Simulasi pengiriman data ke Backend (Flask/FastAPI)
        // Ganti URL ini dengan endpoint API Anda nantinya
        try {
            const response = await fetch('/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            
            const result = await response.json();
            
            // Tampilkan hasil
            amountText.innerText = `$${result.prediction.toLocaleString()}`;
            resultDiv.classList.remove('d-none');
        } catch (error) {
            console.error("Error:", error);
            alert("Gagal terhubung ke server model!");
        }
    };
</script>

</body>
</html>
